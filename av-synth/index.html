<!DOCTYPE html>
<html>
  <head>
    <title>Live Synth</title>
    <style>
    body { 
      margin: 0; 
      overflow: hidden;
      background: #000;
    }
    canvas { 
      width: 100vw; 
      height: 100vh; 
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #0f0;
      font-family: monospace;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      font-size: 12px;
    }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/hydra-synth"></script>
    <script>
    const hydra = new Hydra({ detectAudio: false });
    // Initialize camera
    s0.initCam();

    window.wsPort = new URLSearchParams(window.location.search).get('port') || '8765';

    window.activeNotes = new Map();  // keys only (channel 0)
    window.lastNote = 60;
    window.noteCount = 0;
    window.avgVelocity = 0;
    window.ccValues = new Array(9).fill(0);
    window.activePads = new Map();   // pads only (channel 9)

    const ws = new WebSocket(`ws://localhost:${window.wsPort}`);

    ws.onopen = () => {};

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      const isPad = data.channel === 9;

      if (data.type === 'note_on' && data.velocity > 0) {
        if (isPad) {
          activePads.set(data.note, data.velocity);
        } else {
          activeNotes.set(data.note, data.velocity);
          window.lastNote = data.note;
        }
      } else if (data.type === 'note_off' || (data.type === 'note_on' && data.velocity === 0)) {
        if (isPad) {
          activePads.delete(data.note);
        } else {
          activeNotes.delete(data.note);
        }
      } else if (data.type === 'control_change') {
        if (data.control === 1) {
          ccValues[8] = data.value;
        } else if (data.control >= 70 && data.control <= 77) {
          ccValues[data.control - 70] = data.value;
        }
      }
      
      window.noteCount = activeNotes.size;
      
      if (activeNotes.size > 0) {
        const velocities = Array.from(activeNotes.values());
        window.avgVelocity = velocities.reduce((a, b) => a + b, 0) / velocities.length;
      } else {
        window.avgVelocity = 0;
      }
      
      const notesStr = Array.from(activeNotes.keys()).join(', ');
      const padsStr = Array.from(activePads.keys()).join(', ');
      document.getElementById('midi').innerHTML = 
        `Active notes: ${noteCount}<br>` +
        `Notes: [${notesStr}]<br>` +
        `Pads: [${padsStr}]<br>` +
        `Last: ${lastNote} | Avg velocity: ${Math.round(avgVelocity)}<br>` +
        `CC: [${ccValues.map(v => Math.round(v)).join(', ')}]`;
    };

    ws.onerror = () => {};

    ws.onclose = () => {};
    </script>

    <script src="visual.js"></script>
    <script>
    runVisual();
    </script>
  </body>
</html>
